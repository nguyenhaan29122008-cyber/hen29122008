<style>
#musicBtn {
  position: fixed;
  bottom: 25px;
  right: 25px;

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Nunito',sans-serif;

linear-gradient(
rgba(255,240,248,.25),

/* OVERLAY */
.letter-overlay{

inset:0;
background:rgba(0,0,0,.35);
backdrop-filter:blur(6px);
display:flex;
justify-content:center;

@keyframes fadeIn{

to{opacity:1}

/* ENVELOPE OPEN ANIMATION */
.open-box{

@keyframes pop{

/* MUSIC BUTTON */

#musicBtn{
  position:fixed;
  bottom:100px;
  right:25px;

  width:65px;
  height:65px;

  border:none;
  border-radius:50%;

  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(12px);

  color:#d46b9a;
  font-size:32px;
  font-weight:bold;

  cursor:pointer;

  box-shadow:0 8px 20px rgba(212,107,154,0.15);

  transition:all .3s ease;

  z-index:9999;
}

#musicBtn:hover{
  transform:scale(1.08);
  background:rgba(255,255,255,0.5);
}

.playing{
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
/* FLOWERS */

.flowers{

position:fixed;
inset:0;

pointer-events:none;
overflow:hidden;

z-index:1;

}

.flower{

position:absolute;
top:-10%;

animation:fall linear forwards;

opacity:.8;

}

@keyframes fall{

0%{

transform:
translateY(-10vh)
rotate(0deg);

}

100%{

transform:
translateY(120vh)
rotate(360deg);

}

}

/* LOADER */

#loader{

position:fixed;
inset:0;

background:
linear-gradient(
to bottom,
#fff5fa,
#ffeef5
);

display:flex;
justify-content:center;
align-items:center;

z-index:999999;

transition:1s;

}

.loader-text{

font-size:58px;

font-family:
"Playfair Display";

color:#d46b9a;

animation:pulse 2s infinite;

}
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}



/* HEADER */

.header{

position:fixed;

top:0;
left:0;

width:100%;
height:90px;

display:flex;

justify-content:space-between;
align-items:center;

padding:0 35px;

background:
linear-gradient(
to bottom,
rgba(255,245,250,0.9),
rgba(255,245,250,0.55)

border-bottom:
1px solid rgba(255,255,255,.35);

0 8px 30px rgba(212,107,154,.08);

.logo img{

.nav{

.title-box{

text-align:center;

position:relative;

z-index:5;

}

.title-bg{

display:inline-block;

padding:18px 45px;

border-radius:30px;

background:
rgba(255,250,252,.72);

backdrop-filter:blur(12px);

0 10px 30px rgba(212,107,154,.12);

"Playfair Display";

.sub-title{

/* LETTERS */

.letters{

width:100%;

max-width:1400px;

margin:auto;

padding:
40px 30px 80px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:35px;

z-index:5;

}

/* LETTER CARD */

.letter{

height:240px;

border-radius:30px;

position:relative;

cursor:pointer;

overflow:hidden;

transition:.45s;

background:
linear-gradient(
145deg,
rgba(255,248,251,.96),
rgba(255,240,247,.93)
);

backdrop-filter:blur(10px);

box-shadow:
0 15px 35px rgba(212,107,154,.12);

border:
1px solid rgba(255,255,255,.6);

}

.letter:hover{

transform:
translateY(-10px)
scale(1.03);

box-shadow:
0 25px 50px rgba(212,107,154,.18);

}

/* ENVELOPE */

.envelope{

position:absolute;

inset:0;

padding:35px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}

.envelope::before{

content:"💌";

font-size:68px;

margin-bottom:15px;

filter:drop-shadow(
0 4px 8px rgba(0,0,0,.12)
);

}

.from{

font-size:22px;

font-weight:800;

}

.date{

linear-gradient(

#eb76a8
);

box-shadow:
0 10px 20px rgba(235,118,168,.25);

}

inset:0;

padding:30px;

overflow:auto;

animation:fadeIn .4s ease;

@keyframes fadeIn{

from{
opacity:0;
transform:scale(.95);
}

to{
opacity:1;
transform:scale(1);
}

}

.open-letter h3{

font-size:28px;

margin-bottom:18px;

"Playfair Display";

}

font-size:18px;

white-space:pre-wrap;

}

/* ADMIN */

.admin-btn{

position:fixed;

right:25px;

width:65px;
height:65px;

border-radius:50%;

background:
linear-gradient(
135deg,
#f8b5cf,
#ec76a8
);

display:flex;

justify-content:center;
align-items:center;

font-size:30px;

color:white;

cursor:pointer;

z-index:99999;

0 12px 30px rgba(235,118,168,.35);

.admin-btn:hover{

transform:
scale(1.08)
rotate(15deg);

}

/* POPUP */

.admin-popup{

position:fixed;
inset:0;

background:
rgba(0,0,0,.35);

justify-content:center;

inset:0;

.vn-box{

}

/* ===== ANIME ENVELOPE UPGRADE ===== */

.letter{
perspective:1000px;
transition:0.6s;
}

.envelope-front{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
border-radius:30px;
background:linear-gradient(145deg,#fff,#ffe6f2);
backdrop-filter:blur(10px);
overflow:hidden;
}

.envelope-front .shine{
position:absolute;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
transform:rotate(25deg);
animation:shineMove 3s infinite;
}

@keyframes shineMove{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

.from{
font-size:22px;
font-weight:800;
color:#d46b9a;
z-index:2;
}

.date{
color:#999;
margin-top:8px;
z-index:2;
}

.hint{
margin-top:15px;
font-size:14px;
color:#ff7aa8;
opacity:.8;
z-index:2;
}

/* OPEN ANIMATION */
.letter.open{
transform:scale(1.1) rotateY(180deg);
}

.anime-open{
animation:openPop 0.6s ease;
}

@keyframes openPop{
0%{transform:scale(.8);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.paper-text{
white-space:pre-wrap;
font-size:18px;

}

.delete-btn{

padding:10px 15px;

border-radius:12px;
background:linear-gradient(90deg,#ff6b9d,#ff3d7f);
color:white;
font-weight:700;
cursor:pointer;
}
/* ===== CUT ENVELOPE EFFECT ===== */

.envelope-cut{
position:absolute;
inset:0;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(145deg,#ffe6f2,#fff);
}

.envelope-left,
.envelope-right{
position:absolute;
width:50%;
height:100%;
top:0;
background:linear-gradient(145deg,#ffd1e6,#fff);
transition:0.6s ease;
}

.envelope-left{
left:0;
border-right:1px solid rgba(0,0,0,.05);
}

.envelope-right{
right:0;
border-left:1px solid rgba(0,0,0,.05);
}

/* rạch phong bì */
.letter.cutting .envelope-left{
transform:translateX(-100%) rotate(-5deg);
opacity:0;
}

.letter.cutting .envelope-right{
transform:translateX(100%) rotate(5deg);
opacity:0;
}
.envelope-cut{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(145deg,#ffe6f2,#fff);
}

.envelope-left,
.envelope-right{
position:absolute;
width:50%;
height:100%;
top:0;
background:linear-gradient(145deg,#ffd1e6,#fff);
transition:0.7s ease;
}

.envelope-left{
left:0;
}

.envelope-right{
right:0;
}

.letter.cutting .envelope-left{
transform:translateX(-100%);
opacity:0;
}

.letter.cutting .envelope-right{
transform:translateX(100%);
opacity:0;
}

.knife{
position:absolute;
width:140px;
height:2px;
background:#ff3d7f;
top:50%;
animation:slash 0.7s ease forwards;
box-shadow:0 0 12px #ff3d7f;
}

@keyframes slash{

}

.paper-fall{

}

0%{transform:translateY(0) scale(0.5);opacity:0;}

.knife{

.open-letter p,
.paper-text,

.open-letter,

<button id="musicBtn">♫</button>



<script>



let playing = false;
const btn = document.getElementById("musicBtn");
btn.addEventListener("click", () => {
  if (window.music.paused) {
    window.music.play();
    btn.classList.add("playing");
    btn.innerHTML = "❚❚";
  } else {
    window.music.pause();
    btn.classList.remove("playing");
    btn.innerHTML = "♫";
  }
});
</script>
<script src="music.js"></script>

<script>
let musicStarted = false;

// đảm bảo chỉ tạo 1 audio duy nhất
if (!window.music) {
  window.music = new Audio("./music.mp3");
  window.music.loop = true;
  window.music.preload = "auto";
  window.music.volume = 1;
}

// FIX AUTOPLAY CONFLICT
function safeStartMusic() {
  if (musicStarted) return;

  window.music.play()
    .then(() => {
      musicStarted = true;
      console.log("🎵 Music started safely");
    })
    .catch(err => {
      console.log("⛔ Autoplay blocked:", err);
    });
}

// chỉ chạy 1 lần khi user click lần đầu
document.addEventListener("click", () => {
  safeStartMusic();
}, { once: true });
</script>
